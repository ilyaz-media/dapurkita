<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Menu - DapurKita</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- font awesome -->
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif']
                    },
                    colors: {
                        primary: '#F59E0B'
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="font-poppins bg-white">

    <!-- HERO -->
    <section class="relative h-[380px] md:h-[420px] bg-cover bg-center"
        style="background-image: url('images/restaurant.png');">

        <!-- Overlay -->
        <div class="absolute inset-0 bg-black/70"></div>

        <!-- Content -->
        <div class="relative z-10 container mx-auto h-full px-5 lg:px-8">

          <!-- Navbar -->
<nav class="flex items-center justify-between py-4 sm:py-5 lg:py-6">

    <!-- Logo -->
    <a href="index.html" class="flex items-center gap-3">

        <div
            class="w-10 h-10 sm:w-12 sm:h-12 rounded-xl bg-primary flex items-center justify-center text-white text-lg sm:text-2xl">

            <i class="fa-solid fa-house"></i>

        </div>

        <div>

            <h2 class="text-lg sm:text-2xl font-bold text-white">
                Dapur<span class="text-primary">Kita</span>
            </h2>

            <p class="hidden sm:block text-xs sm:text-sm text-gray-300">
                Rumah Makan
            </p>

        </div>

    </a>

    <!-- Button -->
    <div class="flex items-center gap-2 sm:gap-3">

        <!-- Tombol Kembali -->
        <a href="index.html"
            class=" md:flex items-center gap-2 px-4 py-2 rounded-full border border-white/30 text-white hover:bg-white hover:text-black duration-300">

            <i class="fa-solid fa-arrow-left"></i>
            <span class="hidden sm:inline">
                Kembali
            </span>

        </a>

        <!-- Tombol Pesan -->
        <a href="#"
            class="flex items-center justify-center gap-2 px-4 sm:px-5 md:px-7 py-2.5 sm:py-3 rounded-full bg-primary text-white font-semibold hover:bg-orange-600 duration-300">

            <i class="fa-solid fa-phone"></i>

            <span class="hidden sm:inline">
                Pesan Sekarang
            </span>

        </a>

    </div>

</nav>

            <!-- Hero Content -->
            <div class="flex items-center justify-center text-center h-[calc(100%-88px)]">

                <div class="max-w-3xl">

                    <span class="text-primary uppercase tracking-[6px] font-semibold text-sm">
                        DapurKita
                    </span>

                    <h1 class="mt-3 text-4xl sm:text-5xl md:text-6xl font-extrabold text-white">

                        Daftar <span class="text-primary">Menu</span>

                    </h1>

                    <p class="mt-5 text-gray-300 text-sm md:text-lg leading-7 max-w-2xl mx-auto">

                        Temukan berbagai pilihan hidangan favorit yang dibuat dari
                        bahan berkualitas dengan cita rasa terbaik untuk menemani
                        setiap momen Anda.

                    </p>

                </div>

            </div>

        </div>

    </section>

   <!-- CATEGORY -->
<section class="py-12 md:py-16 bg-white">

    <div class="container mx-auto px-4 sm:px-6 lg:px-8">

<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">

    <button class="category-btn active flex items-center justify-center gap-2 h-12 rounded-xl bg-primary text-white font-medium transition"
        data-category="semua">
        <i class="fa-solid fa-utensils"></i>
        Semua
    </button>

    <button class="category-btn flex items-center justify-center gap-2 h-12 rounded-xl bg-orange-50 text-gray-700 hover:bg-primary hover:text-white transition"
        data-category="ayam">
        <i class="fa-solid fa-drumstick-bite"></i>
        Ayam
    </button>

    <button class="category-btn flex items-center justify-center gap-2 h-12 rounded-xl bg-orange-50 text-gray-700 hover:bg-primary hover:text-white transition"
        data-category="nasi">
        <i class="fa-solid fa-bowl-rice"></i>
        Paket Nasi
    </button>

    <button class="category-btn flex items-center justify-center gap-2 h-12 rounded-xl bg-orange-50 text-gray-700 hover:bg-primary hover:text-white transition"
        data-category="mie">
        <i class="fa-solid fa-bowl-food"></i>
        Mie
    </button>

    <button class="category-btn flex items-center justify-center gap-2 h-12 rounded-xl bg-orange-50 text-gray-700 hover:bg-primary hover:text-white transition"
        data-category="seafood">
        <i class="fa-solid fa-fish"></i>
        Seafood
    </button>

    <button class="category-btn flex items-center justify-center gap-2 h-12 rounded-xl bg-orange-50 text-gray-700 hover:bg-primary hover:text-white transition"
        data-category="minuman">
        <i class="fa-solid fa-mug-hot"></i>
        Minuman
    </button>

</div>

        <!-- MENU -->
        <div id="menu" class="pt-10 md:pt-14">

            <div
                id="menu-list"
                class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5 sm:gap-6 lg:gap-8">

            </div>

        </div>

    </div>

</section>
    <script src="js/data.js"></script>
    <script src="js/menu.js"></script>
</body>

</html>
